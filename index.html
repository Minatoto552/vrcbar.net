<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VRC Cocktail Menu</title>

  <link rel="stylesheet" href="遊び.css" />
</head>
<body>

  <header>
    <h1>🍸 VRC Cocktail Menu</h1>
    <p>VRCバー向けのカクテルレシピ管理サイト</p>
  </header>

  <main>

    <section class="panel">

      <h2>カクテル登録</h2>

      <form id="cocktailForm">

        <label>カテゴリー</label>

        <select id="category" required>

          <option value="" selected disabled>
            選択してください
          </option>

          <option>ノーマル</option>
          <option>キャストオリカク</option>
          <option>スタッフオリカク</option>

        </select>

        <label>カクテル名</label>
        <input id="name" required />

        <label>味イメージ</label>

        <select id="taste" required>

          <option value="" selected disabled>
            選択してください
          </option>

          <option>甘い</option>
          <option>超甘い</option>
          <option>さっぱり</option>
          <option>フルーティー</option>
          <option>ミルク系</option>
          <option>炭酸系</option>
          <option>苦め</option>
          <option>大人っぽい</option>
          <option>デザート系</option>
          <option>コーヒー系</option>
          <option>チョコ系</option>
          <option>紅茶系</option>
          <option>和風</option>
          <option>かわいい系</option>
          <option>映え系</option>
          <option>ネタ系</option>
          <option>危険そう</option>

        </select>

        <label>材料・使用ボトル</label>
        <textarea id="bottles"></textarea>

        <label>作り方</label>
        <textarea id="recipe"></textarea>

        <label>説明</label>
        <textarea id="description"></textarea>

        <label>画像URL</label>
        <input id="image" />

        <button type="submit" class="primary">
          登録する
        </button>

      </form>

    </section>

    <section>

      <div class="tools">
        <input id="search" placeholder="検索..." />
      </div>

      <div id="menuList" class="menu-grid"></div>

    </section>

  </main>

  <script src="遊び.js"></script>

</body>
</html>
