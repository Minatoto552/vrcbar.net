<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VRC Bar System</title>
  <link rel="stylesheet" href="遊び.css" />
</head>
<body>

<div id="emergencyOverlay" class="emergency-overlay hidden">
  <div class="emergency-popup">
    <h1>🚨 緊急通知 🚨</h1>
    <p id="emergencyText"></p>
    <button id="closeEmergencyButton">閉じる</button>
  </div>
</div>

<header>
  <h1>🍸 VRC Bar System</h1>
</header>

<section id="loginPage" class="page active">
  <div class="panel">
    <h2>グループを開く</h2>

    <select id="groupSelect"></select>

    <input id="groupPassword" type="password" placeholder="パスワード" />

    <button id="loginButton">ログイン</button>

    <button id="goCreateGroupButton" class="subButton">
      グループを作成
    </button>
  </div>
</section>

<section id="createGroupPage" class="page">
  <div class="panel">
    <h2>グループ作成</h2>

    <input id="newGroupName" placeholder="グループ名" />
    <input id="newGroupPassword" type="password" placeholder="パスワード" />

    <button id="createGroupButton">作成</button>
    <button id="backToLoginButton" class="subButton">戻る</button>
  </div>
</section>

<section id="homePage" class="page">
  <div class="homeButtons">
    <button id="goOrderButton">注文画面</button>
    <button id="goReceiveButton">受け取り画面</button>
    <button id="goHistoryButton">注文履歴</button>
    <button id="goEmergencyButton" class="danger">
      🚨 緊急通知
    </button>
  </div>
</section>

<section id="orderPage" class="page">
  <div class="topBar">
    <h2>注文画面</h2>
    <button class="backHome">ホーム</button>
  </div>

  <div class="panel">
    <label>卓</label>
    <select id="orderTableSelect"></select>

    <label>名前</label>
    <select id="customerNameSelect"></select>

    <label>メモ</label>
    <textarea id="orderMemo"></textarea>

    <button id="sendOrderButton">
      注文する
    </button>
  </div>
</section>

<section id="receivePage" class="page">
  <div class="topBar">
    <h2>受け取り画面</h2>
    <button class="backHome">ホーム</button>
  </div>

  <div id="receiveList"></div>
</section>

<section id="historyPage" class="page">
  <div class="topBar">
    <h2>注文履歴</h2>
    <button class="backHome">ホーム</button>
  </div>

  <button id="resetHistoryButton" class="danger">
    履歴リセット
  </button>

  <div id="historyList"></div>
</section>

<section id="emergencyPage" class="page">
  <div class="topBar">
    <h2>緊急通知</h2>
    <button class="backHome">ホーム</button>
  </div>

  <div class="panel">
    <label>名前</label>
    <input id="emergencyName" />

    <label>卓</label>
    <input id="emergencyTable" />

    <button id="sendEmergencyButton" class="danger">
      🚨 緊急通知を送信
    </button>
  </div>
</section>

<script type="module" src="./遊び.js"></script>
</body>
</html>
