<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VRC Bar System</title>
  <link rel="stylesheet" href="遊び.css" />
</head>
<body>

<div id="emergencyOverlay" class="emergency-overlay hidden">
  <div class="emergency-popup">
    <h1>🚨 緊急通知 🚨</h1>
    <p id="emergencyText"></p>
    <button id="closeEmergencyButton" class="secondary">
      閉じる
    </button>
  </div>
</div>

<header>
  <h1>🍸 VRC Bar System</h1>
  <p>メニュー登録・注文・受け取り管理</p>
</header>

<section id="loginPage" class="page active">
  <div class="panel center-panel">
    <h2>グループを開く</h2>

    <label>グループ選択</label>
    <select id="groupSelect"></select>

    <label>グループパスワード</label>
    <input id="groupPassword" type="password" />

    <button id="loginButton" class="primary">
      ログイン
    </button>

    <button id="goCreateGroupButton" class="small-link-button">
      ＋ グループ作成
    </button>
  </div>
</section>

<section id="createGroupPage" class="page">
  <div class="panel center-panel">
    <h2>グループ作成</h2>

    <label>グループ名</label>
    <input id="newGroupName" />

    <label>グループパスワード</label>
    <input id="newGroupPassword" type="password" />

    <button id="createGroupButton" class="primary">
      作成する
    </button>

    <button id="backToLoginButton" class="secondary">
      戻る
    </button>
  </div>
</section>

<section id="homePage" class="page">
  <div class="top-menu">
    <p id="currentGroupText"></p>

    <button id="logoutButton" class="secondary mini">
      ログアウト
    </button>
  </div>

  <div class="menu-buttons">
    <button id="homeOrderButton" class="primary">
      注文画面
    </button>

    <button id="homeReceiveButton" class="primary">
      受け取り
    </button>

    <button id="homeHistoryButton" class="primary">
      注文履歴
    </button>

    <button id="homeListButton" class="primary">
      メニュー一覧
    </button>

    <button id="homeSettingButton" class="secondary">
      設定
    </button>
  </div>
</section>

<section id="settingPage" class="page">
  <div class="top-menu">
    <h2>設定</h2>

    <button class="secondary mini backHome">
      ホーム
    </button>
  </div>

  <div class="menu-buttons">
    <button id="settingRegisterButton" class="primary">
      メニュー登録
    </button>

    <button id="settingOptionButton" class="primary">
      選択項目管理
    </button>

    <button id="settingTableButton" class="primary">
      卓管理
    </button>

    <button id="settingNameButton" class="primary">
      注文者名管理
    </button>

    <button id="settingAdminButton" class="danger-button">
      管理人メニュー
    </button>
  </div>
</section>

<section id="listPage" class="page">
  <div class="top-menu">
    <h2>メニュー一覧</h2>

    <button class="secondary mini backHome">
      ホーム
    </button>
  </div>

  <div class="page-nav">
    <button class="navOrder">注文</button>
    <button class="navReceive">受け取り</button>
    <button class="navHistory">履歴</button>
    <button class="navList active-nav">メニュー一覧</button>
  </div>

  <div class="tools">
    <input id="search" placeholder="検索..." />
  </div>

  <div id="menuList" class="menu-grid"></div>
</section>

<section id="registerPage" class="page">
  <div class="panel center-panel">
    <h2>メニュー登録</h2>

    <form id="cocktailForm">

      <input type="hidden" id="editCocktailId" />

      <label>商品タイプ</label>
      <select id="itemType">
        <option>通常</option>
        <option>フード</option>
        <option>オリジナル</option>
      </select>

      <label>カテゴリー</label>
      <select id="category">
        <option>ノーマル</option>
        <option>キャストオリカク</option>
        <option>スタッフオリカク</option>
        <option>フード</option>
      </select>

      <label>商品名</label>
      <input id="name" />

      <label>味</label>
      <select id="taste">
        <option>甘い</option>
        <option>超甘い</option>
        <option>さっぱり</option>
        <option>フルーティー</option>
        <option>ミルク系</option>
        <option>炭酸系</option>
        <option>苦め</option>
        <option>大人っぽい</option>
        <option>デザート系</option>
        <option>ネタ系</option>
      </select>

      <label>材料・内容</label>
      <textarea id="bottles"></textarea>

      <label>作り方</label>
      <textarea id="recipe"></textarea>

      <label>説明</label>
      <textarea id="description"></textarea>

      <label>画像URL</label>
      <input id="image" />

      <button type="submit" class="primary" id="submitButton">
        登録する
      </button>

    </form>

    <button class="secondary backSetting">
      設定へ戻る
    </button>
  </div>
</section>

<section id="orderPage" class="page">

  <div class="top-menu">
    <h2>注文画面</h2>

    <button class="secondary mini backHome">
      ホーム
    </button>
  </div>

  <div class="page-nav">
    <button class="navOrder active-nav">注文</button>
    <button class="navReceive">受け取り</button>
    <button class="navHistory">履歴</button>
    <button class="navList">メニュー一覧</button>

    <button id="orderEmergencyButton" class="danger-mini">
      🚨 緊急
    </button>
  </div>

  <div class="order-layout">

    <div class="panel">

      <label>卓</label>
      <select id="orderTableSelect"></select>

      <label>名前</label>
      <select id="customerNameSelect"></select>

      <label>メモ</label>
      <textarea id="orderMemo"></textarea>

      <div class="tab-buttons">

        <button
          type="button"
          class="tab-button active"
          data-tab="normal"
        >
          通常
        </button>

        <button
          type="button"
          class="tab-button"
          data-tab="food"
        >
          フード
        </button>

        <button
          type="button"
          class="tab-button"
          data-tab="original"
        >
          オリジナル
        </button>

      </div>
    </div>

    <div>

      <div id="normalOrderPanel" class="order-tab active">
        <h3>通常注文</h3>

        <div id="normalOptions"></div>

        <button id="addNormalToCartButton" class="primary">
          カートに追加
        </button>
      </div>

      <div id="foodOrderPanel" class="order-tab">
        <h3>フード</h3>
        <div id="foodItemList" class="menu-grid"></div>
      </div>

      <div id="originalOrderPanel" class="order-tab">
        <h3>オリジナル</h3>
        <div id="originalItemList" class="menu-grid"></div>
      </div>

    </div>

    <div class="panel cart-panel">
      <h3>買い物カート</h3>

      <div id="cartList"></div>

      <button id="sendOrderButton" class="primary">
        注文する
      </button>
    </div>

  </div>
</section>

<section id="receivePage" class="page">

  <div class="top-menu">
    <h2>受け取り画面</h2>

    <button class="secondary mini backHome">
      ホーム
    </button>
  </div>

  <div class="page-nav">
    <button class="navOrder">注文</button>
    <button class="navReceive active-nav">受け取り</button>
    <button class="navHistory">履歴</button>
    <button class="navList">メニュー一覧</button>
  </div>

  <div id="orderReceiveList"></div>
</section>

<section id="historyPage" class="page">

  <div class="top-menu">
    <h2>注文履歴</h2>

    <button class="secondary mini backHome">
      ホーム
    </button>
  </div>

  <div class="page-nav">
    <button class="navOrder">注文</button>
    <button class="navReceive">受け取り</button>
    <button class="navHistory active-nav">履歴</button>
    <button class="navList">メニュー一覧</button>
  </div>

  <div class="panel center-panel">
    <button id="resetHistoryButton" class="danger-button">
      注文履歴をリセット
    </button>
  </div>

  <div id="orderHistoryList"></div>
</section>

<section id="emergencyPage" class="page">

  <div class="top-menu">
    <h2>緊急通知</h2>

    <button class="secondary mini backOrder">
      注文へ戻る
    </button>
  </div>

  <div class="panel center-panel">

    <label>名前</label>
    <select id="emergencyNameSelect"></select>

    <label>卓</label>
    <select id="emergencyTableSelect"></select>

    <button id="sendEmergencyButton" class="danger-button">
      🚨 緊急通知を送信
    </button>

  </div>
</section>

<script type="module" src="./遊び.js?v=40"></script>

</body>
</html>
